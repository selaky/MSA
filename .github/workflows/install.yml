name: install

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "**.py"
      - "hook/**"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "**.py"
      - "hook/**"
  workflow_dispatch:

jobs:
  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set_tag
        run: |
          # 检查标签格式
          is_release=${{ startsWith(github.ref, 'refs/tags/v') }}
          tag=$(git describe --tags --match "v*" ${{ github.ref }} || true)
          if [[ $tag != v* ]]; then
            tag=$(curl -sX GET "https://api.github.com/repos/${{ github.repository }}/releases/latest" --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' | awk '/tag_name/{print $4}' FS='["]')
            if [[ $tag != v* ]]; then
              tag="v0.0.0"
            fi
            tag=$(date "+$tag-%y%m%d-$(git rev-parse --short HEAD)")
          fi

          if ! $($is_release) ; then
            prefix=${tag%-*-*}
            suffix=${tag#$prefix-}
            tag="$prefix-ci.$suffix"
          fi

          # 检查是否为预发布版本
          is_prerelease=false
          if [[ $tag =~ .*alpha.* || $tag =~ .*beta.* || $tag =~ .*rc.* || $tag =~ .*dev.* || $tag =~ .*-ci.* ]]; then
            is_prerelease=true
            echo "This is a pre-release version"
          fi

          echo tag=$tag | tee -a $GITHUB_OUTPUT
          echo is_release=$is_release | tee -a $GITHUB_OUTPUT
          echo is_prerelease=$is_prerelease | tee -a $GITHUB_OUTPUT
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      is_release: ${{ steps.set_tag.outputs.is_release }}
      is_prerelease: ${{ steps.set_tag.outputs.is_prerelease }}

  # Windows Base 版（前台模式，mouse=Seize）
  install-windows-base:
    needs: meta
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x86_64]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download MaaFramework
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-win-${{ matrix.arch }}*"
          latest: true
          out-file-path: "deps"
          extract: true

      - name: Download MFAAvalonia
        id: download_mfa
        uses: robinraju/release-downloader@v1
        with:
          repository: SweetSmellFox/MFAAvalonia
          fileName: "MFAAvalonia-*-win-${{ (matrix.arch == 'x86_64' && 'x64') || (matrix.arch == 'aarch64' && 'arm64') }}*"
          latest: true
          out-file-path: "MFA"
          extract: true

      - name: Clean up MFAAvalonia archive
        shell: bash
        run: |
          ARCHIVE_FILE_PATH="${{ fromJson(steps.download_mfa.outputs.downloaded_files)[0] }}"
          rm -f "${ARCHIVE_FILE_PATH}"

      - name: Remove built-in runtime in MFA
        shell: bash
        run: |
          rm -rf MFA/runtimes

      - name: Setup Embedded Python
        shell: bash
        run: |
          python tools/ci/setup_embed_python.py ${{ (matrix.arch == 'x86_64' && 'amd64') || 'arm64' }}

      - name: Download Python Dependencies
        shell: bash
        run: |
          PLATFORM_TAG="${{ (matrix.arch == 'x86_64' && 'win-x64') || 'win-arm64' }}"
          ./install/python/python.exe tools/ci/download_deps.py "${PLATFORM_TAG}" --deps-dir install/deps

      - name: Copy MFA to install directory
        shell: pwsh
        run: |
          if (Test-Path "MFA") {
            Write-Host "Copying MFA files to install directory..."
            New-Item -ItemType Directory -Force -Path install | Out-Null
            Copy-Item -Path "MFA\*" -Destination "install" -Recurse -Force
            Copy-Item -Path "assets\logo.ico" -Destination "install\Assets\logo.ico" -Force -ErrorAction SilentlyContinue
            Write-Host "MFA files copied successfully."
          }

      - name: Install (Base)
        shell: bash
        run: |
          PLATFORM_TAG="${{ (matrix.arch == 'x86_64' && 'win-x64') || 'win-arm64' }}"
          pip install json-with-comments
          python tools/ci/install.py ${{ needs.meta.outputs.tag }} "${PLATFORM_TAG}"

      - name: Customize exe icon and name
        shell: pwsh
        run: |
          $RCEDIT_VERSION = "v2.0.0"
          Invoke-WebRequest -Uri "https://github.com/electron/rcedit/releases/download/${RCEDIT_VERSION}/rcedit-x64.exe" -OutFile "rcedit.exe"
          .\rcedit.exe install\MFAAvalonia.exe --set-icon assets\logo.ico
          Rename-Item -Path "install\MFAAvalonia.exe" -NewName "MSA天狼星小助手.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: MSA-win-${{ matrix.arch }}-Base
          path: "install"

  # Windows Background 版（后台模式，Hook DLL + mouse=SendMessage）
  install-windows-background:
    needs: meta
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x86_64]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download MaaFramework
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-win-${{ matrix.arch }}*"
          latest: true
          out-file-path: "deps"
          extract: true

      - name: Download MFAAvalonia
        id: download_mfa
        uses: robinraju/release-downloader@v1
        with:
          repository: SweetSmellFox/MFAAvalonia
          fileName: "MFAAvalonia-*-win-${{ (matrix.arch == 'x86_64' && 'x64') || (matrix.arch == 'aarch64' && 'arm64') }}*"
          latest: true
          out-file-path: "MFA"
          extract: true

      - name: Clean up MFAAvalonia archive
        shell: bash
        run: |
          ARCHIVE_FILE_PATH="${{ fromJson(steps.download_mfa.outputs.downloaded_files)[0] }}"
          rm -f "${ARCHIVE_FILE_PATH}"

      - name: Remove built-in runtime in MFA
        shell: bash
        run: |
          rm -rf MFA/runtimes

      - name: Download OpenCV headers
        shell: bash
        run: |
          curl -sL "https://github.com/opencv/opencv/archive/refs/tags/4.10.0.zip" -o opencv.zip
          unzip -q opencv.zip
          mkdir -p hook/third_party/opencv/include
          cp -r opencv-4.10.0/modules/core/include/opencv2 hook/third_party/opencv/include/
          echo '#pragma once' > hook/third_party/opencv/include/opencv2/opencv_modules.hpp
          echo '#define HAVE_OPENCV_CORE' >> hook/third_party/opencv/include/opencv2/opencv_modules.hpp
          rm -rf opencv.zip opencv-4.10.0

      - name: Build Hook DLLs
        shell: cmd
        run: |
          cd hook
          mkdir build
          cd build
          cmake .. -A x64
          cmake --build . --config Release

      - name: Setup Embedded Python
        shell: bash
        run: |
          python tools/ci/setup_embed_python.py ${{ (matrix.arch == 'x86_64' && 'amd64') || 'arm64' }}

      - name: Download Python Dependencies
        shell: bash
        run: |
          PLATFORM_TAG="${{ (matrix.arch == 'x86_64' && 'win-x64') || 'win-arm64' }}"
          ./install/python/python.exe tools/ci/download_deps.py "${PLATFORM_TAG}" --deps-dir install/deps

      - name: Copy MFA to install directory
        shell: pwsh
        run: |
          if (Test-Path "MFA") {
            Write-Host "Copying MFA files to install directory..."
            New-Item -ItemType Directory -Force -Path install | Out-Null
            Copy-Item -Path "MFA\*" -Destination "install" -Recurse -Force
            Copy-Item -Path "assets\logo.ico" -Destination "install\Assets\logo.ico" -Force -ErrorAction SilentlyContinue
            Write-Host "MFA files copied successfully."
          }

      - name: Install (Background)
        shell: bash
        run: |
          PLATFORM_TAG="${{ (matrix.arch == 'x86_64' && 'win-x64') || 'win-arm64' }}"
          pip install json-with-comments
          python tools/ci/install_background.py ${{ needs.meta.outputs.tag }} "${PLATFORM_TAG}"

      - name: Customize exe icon and name
        shell: pwsh
        run: |
          $RCEDIT_VERSION = "v2.0.0"
          Invoke-WebRequest -Uri "https://github.com/electron/rcedit/releases/download/${RCEDIT_VERSION}/rcedit-x64.exe" -OutFile "rcedit.exe"
          .\rcedit.exe install\MFAAvalonia.exe --set-icon assets\logo.ico
          Rename-Item -Path "install\MFAAvalonia.exe" -NewName "MSA天狼星小助手.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: MSA-win-${{ matrix.arch }}-Background
          path: "install"

  # 非 Windows 平台（仅 Base 版）
  install:
    needs: meta
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [macos, linux, android]
        arch: [aarch64, x86_64]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download MaaFramework
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-${{ matrix.os }}-${{ matrix.arch }}*"
          latest: true
          out-file-path: "deps"
          extract: true

      - name: Download MFAAvalonia
        if: matrix.os != 'android'
        id: download_mfa
        uses: robinraju/release-downloader@v1
        with:
          repository: SweetSmellFox/MFAAvalonia
          fileName: "MFAAvalonia-*-${{ (matrix.os == 'macos' && 'osx') || (matrix.os == 'linux' && 'linux') }}-${{ (matrix.arch == 'x86_64' && 'x64') || (matrix.arch == 'aarch64' && 'arm64') }}*"
          latest: true
          out-file-path: "MFA"
          extract: true

      - name: Clean up MFAAvalonia archive
        if: matrix.os != 'android'
        shell: bash
        run: |
          ARCHIVE_FILE_PATH="${{ fromJson(steps.download_mfa.outputs.downloaded_files)[0] }}"
          rm -f "${ARCHIVE_FILE_PATH}"

      - name: Remove built-in runtime in MFA
        if: matrix.os != 'android'
        shell: bash
        run: |
          rm -rf MFA/runtimes

      - name: Install
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" != "android" ]]; then
            if [ -d "MFA" ]; then
              echo "Copying MFA files to install directory..."
              mkdir -p install
              rsync -av --ignore-existing MFA/ install/
              cp assets/logo.ico install/Assets/logo.ico || echo "Logo copy failed!"
              echo "MFA files copied successfully."
            fi
          fi

          # 确定平台标签
          case "${{ matrix.os }}-${{ matrix.arch }}" in
            macos-x86_64)  PLATFORM_TAG="osx-x64" ;;
            macos-aarch64) PLATFORM_TAG="osx-arm64" ;;
            linux-x86_64)  PLATFORM_TAG="linux-x64" ;;
            linux-aarch64) PLATFORM_TAG="linux-arm64" ;;
            *)             PLATFORM_TAG="${{ matrix.os }}-${{ matrix.arch }}" ;;
          esac

          pip install json-with-comments
          python tools/ci/install.py ${{ needs.meta.outputs.tag }} "${PLATFORM_TAG}"

      - uses: actions/upload-artifact@v4
        with:
          name: MSA-${{ matrix.os }}-${{ matrix.arch }}
          path: "install"

  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  release:
    if: ${{ needs.meta.outputs.is_release == 'true' }}
    needs: [meta, install-windows-base, install-windows-background, install, changelog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets

      - run: |
          cd assets
          for f in *; do
            (cd $f && zip -r ../$f-${{ needs.meta.outputs.tag }}.zip .)
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          tag_name: ${{ needs.meta.outputs.tag }}
          body: ${{ needs.changelog.outputs.release_body }}
          draft: false
          prerelease: ${{ needs.meta.outputs.is_prerelease == 'true' }}

        # Mirror酱为第三方分发服务，新项目默认关闭
        # 若有需要请联系 Mirror酱 开通，直接自行开启是无法使用的
        # https://mirrorchyan.com/
      - name: Trigger MirrorChyanUploading
        if: false
        shell: bash
        run: |
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release.yml -f tag=${{ needs.meta.outputs.tag }}
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release_note.yml -f tag=${{ needs.meta.outputs.tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
